services:
  frontend:
    build:
      context: ./bitebytes_app
    container_name: bitebytes-frontend
    ports:
      - "0.0.0.0:8080:80"
    restart: unless-stopped
  backend:
    build:
      context: ./backend
    container_name: bitebytes-backend
    ports:
      - "0.0.0.0:3000:3000"
    restart: unless-stopped
name: Deploy BiteBytes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy containers
        run: |
          cd ~/BITEBYTES

          git fetch origin
          git reset --hard origin/main

          podman-compose down

          podman-compose up -d --build
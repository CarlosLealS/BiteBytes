name: Deploy BiteBytes

on:
  push:
    branches:
      - main   # Se ejecuta cuando haces commit/push a la rama main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Configurar acceso SSH a la VM
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 3. Ejecutar despliegue en la VM
      - name: Deploy en VM
        run: |
          ssh adminc@172.16.13.105 << 'EOF'
            cd ~/BiteBytes

            # Actualizar código
            git pull origin main

            # --- FRONTEND ---
            cd bitebytes_app
            flutter pub get
            flutter build web
            sudo cp -r build/web/* /usr/share/nginx/html/
            sudo systemctl restart nginx

            # --- BACKEND ---
            cd ../backend
            npm install --production
            pm2 restart bitebytes-backend

            # --- MIGRACIONES (si cambias la base) ---
            npm run migrate || true
          EOF
name: Deploy BiteBytes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'

    - name: Build frontend
      working-directory: bitebytes_app
      run: flutter build web

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Deploy to VM
      run: |
      ssh adminc@172.16.13.105 << 'EOF'
        cd ~/BiteBytes

        # Actualizar código
        git pull origin main

        # Frontend
        cd bitebytes_app
        flutter pub get
        flutter build web
        sudo cp -r build/web/* /usr/share/nginx/html/
        sudo systemctl restart nginx

        # Backend
        cd ../backend
        npm install --production
        pm2 restart bitebytes-backend

        # Migraciones (si hay cambios en la base)
        npm run migrate || true
      EOF
name: Deploy BiteBytes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy containers
        run: |
          cd ~/BiteBytes
          git fetch origin
          git reset --hard origin/main
          /usr/local/bin/podman-compose down
          /usr/local/bin/podman-compose up -d --build